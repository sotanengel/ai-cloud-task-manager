name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run test
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: packages/*/coverage/

  security-scan:
    name: Security Scan (trivy)
    runs-on: ubuntu-latest
    # NOTE: 要件定義書§7.3では Shisho Guard の導入を指示しているが、
    # 公式URL (shisho.dev) の Takumi Guard は npm レジストリプロキシであり
    # IaCスキャナではない。IaCスキャンには trivy を採用。
    # Takumi Guard は supply chain security として別途 npm registry 設定で対応。
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (IaC mode)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          skip-dirs: "node_modules,dist,coverage"
      - name: Run Trivy vulnerability scanner (dependency mode)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  supply-chain:
    name: Supply Chain Security (Takumi Guard)
    runs-on: ubuntu-latest
    # Takumi Guard: npm レジストリプロキシ経由でパッケージ供給チェーンセキュリティを確保
    # 詳細: https://shisho.dev/docs/ja/t/guard/quickstart/index.md
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Takumi Guard を利用する場合は .npmrc でレジストリを設定する
          # 現在は anonymous モード（無料）。組織利用時は TAKUMI_GUARD_TOKEN を設定
          cache: "npm"
      - run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security-scan, supply-chain]
    steps:
      - run: echo "All CI checks passed"
